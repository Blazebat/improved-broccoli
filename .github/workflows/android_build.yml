name: Build RadioRage APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Force the runner to use Node 24 for all actions immediately
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        # v6 supports Node 24
        uses: actions/checkout@v6

      - name: Set up Node.js
        # v6 supports Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Java
        # v5 is the updated version that supports Node 24
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          bubblewrap init --manifest=https://radiorage.vercel.app/manifest.json --nonInteractive
          bubblewrap build --skipConfig --yes

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadioRage-Debug-APK
          path: ./*.apk
          retention-days: 7
