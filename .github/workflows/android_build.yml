name: Build RadioRage APK

on:
  # Auto-run when you push to the main branch
  push:
    branches: [ main ]
  
  # Manual run button in GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK (Unsigned Debug)
        # We use --nonInteractive to skip prompts during the automated build
        run: |
          bubblewrap init --manifest=https://radiorage.vercel.app/manifest.json --nonInteractive
          bubblewrap build --nonInteractive

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadioRage-Debug-APK
          path: ./*.apk
          retention-days: 7
