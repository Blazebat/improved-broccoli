name: Build RadioRage APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        # We use 'init' with a specific URL, then immediately 'build' 
        # using the --yes flag to accept all defaults automatically.
        run: |
          bubblewrap init --manifest=https://radiorage.vercel.app/manifest.json --nonInteractive
          bubblewrap build --skipConfig --yes

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadioRage-Debug-APK
          path: ./*.apk
          retention-days: 7
