name: Build RadioRage APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Opt-in to Node.js 24 now to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24' # Updated to match the new runner default

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK (Unsigned Debug)
        run: |
          bubblewrap init --manifest=https://radiorage.vercel.app/manifest.json --nonInteractive
          bubblewrap build --nonInteractive

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadioRage-Debug-APK
          path: ./*.apk
          retention-days: 7
