name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize and Build APK
        run: |
          bubblewrap init --manifest=https://radiorage.vercel.app/manifest.json --nonInteractive
          bubblewrap build --nonInteractive
        # Note: You will need to set up a signing key for a production APK.
        # This will create an unsigned debug APK by default.

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: RadioRage-App
          path: ./*.apk
