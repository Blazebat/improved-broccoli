    <style>
        body { 
            margin: 0; 
            background: #18181b; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        .player { 
            width: 90%; 
            max-width: 480px; 
            background: #27272a; 
            padding: 40px; 
            border-radius: 40px; 
            border: 2px solid #3f3f46; 
            text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); 
        }
        
        .logo { 
            width: 150px; 
            height: 150px; 
            margin-bottom: 25px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 5px solid #fff; 
        }
        
        .display { 
            font-size: 1.5rem; 
            font-weight: 700; 
            margin-bottom: 35px; 
            color: #22c55e; 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            word-break: break-all; 
            background: #000; 
            border-radius: 10px; 
            font-family: 'Courier New', Courier, monospace; 
            letter-spacing: 2px; 
        }

        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 50px; 
        }

        .btn { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            background: #404040; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: 0.3s; 
            border: 4px solid #6b7280; 
            font-size: 1rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            color: #d1d5db; 
        }

        .btn:active { 
            transform: scale(0.95); 
            background: #3b82f6; 
            border-color: #60a5fa; 
            color: #fff; 
        }

        .visualizer { 
            width: 100%; 
            height: 80px; 
            margin-top: 35px; 
            border-radius: 10px; 
            background: #000; 
            display: flex; 
            align-items: flex-end; 
            justify-content: space-between; 
            padding: 5px; 
        }

        .bar { 
            width: 8px; 
            height: 0; 
            background-color: #3b82f6; 
            border-radius: 4px; 
            transition: height 0.05s linear; 
        }

        .status { 
            font-size: 1rem; 
            color: #a1a1aa; 
            margin-top: 25px; 
        }
    </style>
</head>

    const audio = new Audio();
    const dial = new Audio('dial.mp3');
    let isOn = false;
    let hls = new Hls();

    function togglePower() {
        isOn = !isOn;
        document.getElementById('pwrBtn').style.background = isOn ? "#3b82f6" : "#404040";
        if (!isOn) {
            audio.pause();
            audio.src = "";
            dial.pause();
            document.getElementById('display').innerText = "OFF";
            document.getElementById('status').innerText = "Ready";
            document.querySelectorAll('.bar').forEach(bar => bar.style.height = '0');
        } else {
            scanNext();
        }
    }

    function scanNext() {
        if (!isOn) return;
        dial.play().catch(()=>{});
        const s = stations[Math.floor(Math.random() * stations.length)];
        document.getElementById('display').innerText = s.name;
        document.getElementById('status').innerText = "Tuning...";
        if (s.url.includes('.m3u8')) {
            hls.loadSource(s.url);
            hls.attachMedia(audio);
            audio.play().catch(()=>{});
        } else {
            audio.src = s.url;
            audio.load();
            audio.play().catch(()=>{});
        }
        let timer = setTimeout(() => { if (audio.paused) scanNext(); }, 6000);
        audio.onplaying = () => { clearTimeout(timer); dial.pause(); document.getElementById('status').innerText = "LIVE"; };
    }

    audio.onplaying = () => {
        if (isOn) {
            const bars = document.querySelectorAll('.bar');
            bars.forEach(bar => {
                const height = Math.random() * 80;
                bar.style.height = `${height}%`;
            });
        }
    }
</script>
