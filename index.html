    let audio = new Audio();
    let dial = new Audio('dial.mp3');
    let isOn = false;
    let hls = new Hls();
    
    // Web Audio API for Visualizer
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = ctx.createAnalyser();
    const source = ctx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(ctx.destination);

    function togglePower() {
        isOn = !isOn;
        document.getElementById('pwrBtn').classList.toggle('active', isOn);
        if (!isOn) {
            audio.pause();
            dial.pause();
            document.getElementById('display').innerText = "POWER OFF";
        } else {
            scanNext();
        }
    }

    function scanNext() {
        if (!isOn) return;
        dial.play();
        const s = stations[Math.floor(Math.random() * stations.length)];
        document.getElementById('display').innerText = s.name;
        
        if (s.url.includes('.m3u8')) {
            hls.loadSource(s.url);
            hls.attachMedia(audio);
        } else {
            audio.src = s.url;
        }
        audio.play().then(() => { dial.pause(); draw(); });
    }

    function draw() {
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        function render() {
            requestAnimationFrame(render);
            analyser.getByteFrequencyData(dataArray);
            canvasCtx.fillStyle = '#1a1a1e';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            canvasCtx.fillStyle = '#3b82f6';
            dataArray.forEach((v, i) => canvasCtx.fillRect(i * 2, canvas.height - v/4, 1.5, v/4));
        }
        render();
    }
