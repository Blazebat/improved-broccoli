body { 
    margin: 0; 
    background: #0a0a0a;
    color: #f0f0f0; 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    overflow: hidden; 
}

.player { 
    width: 92%; 
    max-width: 520px; 
    background: linear-gradient(180deg, #121212, #0c0c0c); 
    padding: 20px; 
    border-radius: 16px; 
    border: 1px solid #222; 
    border-top: 1px solid #333; 
    border-bottom: 1px solid #111; 
    text-align: center; 
    box-shadow: 
        0 15px 40px rgba(0,0,0,0.7),
        inset 0 2px 6px rgba(255,255,255,0.03);
    position: relative;
    overflow: hidden;
}

.player::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent);
    pointer-events: none;
}

.logo { 
    width: 120px; 
    height: 120px; 
    margin: 15px auto 20px; 
    border-radius: 10px; 
    object-fit: cover; 
    border: 2px solid #2a2a2a; 
    box-shadow: inset 0 0 12px rgba(0,0,0,0.8);
}

.display { 
    min-height: 90px; 
    margin: 0 auto 30px; 
    padding: 12px 20px; 
    border-radius: 10px; 
    background: #001a00;
    border: 2px solid #0a330a; 
    box-shadow: 
        inset 0 0 20px rgba(0,0,0,0.95),
        inset 0 2px 8px rgba(57, 255, 20, 0.15),
        0 0 15px rgba(57, 255, 20, 0.25); 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    text-align: center;
    overflow: hidden;
    position: relative;
}

.display-text {
    font-family: 'Courier New', Courier, monospace;
    font-size: 2rem;
    font-weight: bold;
    color: #39ff14;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 
        0 0 6px rgba(57, 255, 20, 0.9),
        0 0 12px rgba(57, 255, 20, 0.6),
        0 0 20px rgba(57, 255, 20, 0.4);
    line-height: 1.3;
    max-width: 100%;
    word-break: break-word;
    hyphens: auto;
    white-space: normal;
}

@media (max-width: 480px) {
    .display-text { font-size: 1.7rem; }
}

@media (max-width: 400px) {
    .display-text { font-size: 1.45rem; letter-spacing: 1.5px; }
}

.display::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(57, 255, 20, 0.04) 0%,
        transparent 50%,
        rgba(57, 255, 20, 0.03) 100%
    );
    pointer-events: none;
}

.controls { 
    display: flex; 
    justify-content: center; 
    gap: 20px; 
    flex-wrap: wrap;
    margin-bottom: 25px;
}

.btn { 
    width: 80px; 
    height: 80px; 
    border-radius: 14px; 
    background: linear-gradient(145deg, #1e1e1e, #0f0f0f); 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    cursor: pointer; 
    transition: all 0.18s ease;
    border: 2px solid #333; 
    border-top-color: #444;
    border-left-color: #2c2c2c;
    color: #88aaff; 
    font-size: 1rem; 
    font-weight: bold; 
    text-transform: uppercase;
    box-shadow: 
        0 4px 10px rgba(0,0,0,0.5),
        inset 0 2px 4px rgba(255,255,255,0.06);
}

.btn:hover {
    background: linear-gradient(145deg, #2a2a2a, #181818);
    border-color: #555;
    color: #aaccff;
    box-shadow: 0 6px 14px rgba(80, 140, 255, 0.25);
}

.btn:active { 
    transform: translateY(3px); 
    box-shadow: 0 2px 6px rgba(0,0,0,0.6);
    background: #0f0f0f;
}

/* Visualizer Container Fix */
.visualizer {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
    height: 60px;
    width: 100%;
    margin: 20px 0;
}

.visualizer span {
    flex: 1;
    height: 20%;
    border-radius: 4px;
    animation: bounce 0.6s ease-in-out infinite alternate;
    animation-play-state: paused;
}

.visualizer.active span {
    animation-play-state: running;
}

.visualizer span:nth-child(odd) {
    background: linear-gradient(to top, #003366, #66ccff);
}
.visualizer span:nth-child(even) {
    background: linear-gradient(to top, #331100, #ff9933);
}

.visualizer span:nth-child(1) { animation-duration: 0.4s; }
.visualizer span:nth-child(2) { animation-duration: 0.7s; }
.visualizer span:nth-child(3) { animation-duration: 0.5s; }
.visualizer span:nth-child(4) { animation-duration: 0.8s; }
.visualizer span:nth-child(5) { animation-duration: 0.6s; }
.visualizer span:nth-child(6) { animation-duration: 0.45s; }
.visualizer span:nth-child(7) { animation-duration: 0.75s; }
.visualizer span:nth-child(8) { animation-duration: 0.55s; }

@keyframes bounce {
    from { height: 10%; opacity: 0.7; }
    to   { height: 90%; opacity: 1; }
}

.status { 
    font-size: 1rem; 
    color: #a1a1aa; 
    margin-top: 25px; 
}

    const audio = new Audio();
    const dial = new Audio('dial.mp3');
    dial.loop = true; 
    
    let isOn = false;
    let hls = new Hls();
    let scanTimer;

    function togglePower() {
        isOn = !isOn;
        const pwrBtn = document.getElementById('pwrBtn');
        const visualizer = document.getElementById('visualizer');
        
        pwrBtn.style.background = isOn ? "#3b82f6" : "#404040";
        
        if (!isOn) {
            audio.pause();
            audio.src = ""; // Clear memory
            hls.destroy();
            hls = new Hls();
            dial.pause();
            document.getElementById('display').innerText = "OFF";
            document.getElementById('status').innerText = "Ready";
            visualizer.classList.remove('active');
        } else {
            scanNext();
        }
    }

    function scanNext() {
        if (!isOn) return;
        
        // Reset state for tuning
        const visualizer = document.getElementById('visualizer');
        visualizer.classList.remove('active');
        document.getElementById('status').innerText = "Tuning...";
        
        // Play tuning sound
        dial.play().catch(e => console.log("Dial play blocked", e));
        
        const s = stations[Math.floor(Math.random() * stations.length)];
        document.getElementById('display').innerText = s.name;

        // Cleanup
        audio.pause();
        hls.destroy();
        hls = new Hls();

        // Stream selection
        if (s.url.includes('.m3u8')) {
            hls.loadSource(s.url);
            hls.attachMedia(audio);
        } else {
            audio.src = s.url;
        }
        
        audio.play().catch(e => console.log("Stream play blocked", e));

        // Failsafe: retry if no data within 7 seconds
        clearTimeout(scanTimer);
        scanTimer = setTimeout(() => { 
            if (audio.paused && isOn) scanNext(); 
        }, 7000);
    }

    // --- Audio Event Handlers ---
    
    audio.onplaying = () => {
        if (isOn) {
            dial.pause();
            document.getElementById('status').innerText = "LIVE";
            document.getElementById('visualizer').classList.add('active');
            clearTimeout(scanTimer);
        }
    };

    audio.onwaiting = () => {
        if (isOn) {
            dial.play().catch(()=>{});
            document.getElementById('status').innerText = "Buffering...";
            document.getElementById('visualizer').classList.remove('active');
        }
