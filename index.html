<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rage Radio | OPM Hits</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="radio-container">
        <header>
            <div id="onAirBox" class="on-air-box">OFF AIR</div>
            <img src="logo.png" alt="Rage Radio" class="site-logo">
            <p class="tagline">Feel the Energy</p>
        </header>

        <div class="visualizer-container">
            <canvas id="eq" width="300" height="150"></canvas>
        </div>

        <div class="now-playing">
            <h2 id="title">Click Play to Begin</h2>
        </div>

        <div class="controls">
            <button id="playBtn" class="btn">PLAY</button>
            <button id="pauseBtn" class="btn">PAUSE</button>
        </div>

        <button id="requestBtn" class="btn request-btn">REQUEST A SONG</button>
    </div>

    <div id="requestModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>SONG REQUEST</h3>
            <input type="text" id="requestInput" placeholder="Song Title - Artist">
            <button id="sendRequest" class="btn">SEND TO MESSENGER</button>
        </div>
    </div>
    <audio id="audio"></audio>
    <script src="script.js"></script>
</body>
</html>
