    <style>
        :root {
            --retro-gold: #c5a059;
            --radio-body: #2c2c2c;
        }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .radio-container {
            width: 320px;
            background: var(--radio-body);
            padding: 30px;
            border-radius: 15px;
            border: 4px solid var(--retro-gold);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .display {
            background: #1a3a1a;
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 2px inset #000;
            text-shadow: 0 0 5px #00ff00;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.2s;
            text-transform: uppercase;
        }

        #powerBtn {
            background: #8b0000;
            color: white;
        }
        #powerBtn.on { background: #008b00; }

        #nextBtn {
            background: var(--retro-gold);
            color: #000;
        }

        button:active { transform: scale(0.95); }
        
        .status { font-size: 0.8em; margin-top: 5px; color: #aaa; }
    </style>
</head>

    const dialSfx = new Audio('dial.mp3');
    const radioStream = new Audio();
    let isPowerOn = false;

    const nameEl = document.getElementById('stationName');
    const freqEl = document.getElementById('freqDisplay');
    const statusEl = document.getElementById('statusMsg');
    const pwrBtn = document.getElementById('powerBtn');

    // Dial SFX settings
    dialSfx.loop = true;

    function playRandomStation() {
        if (!isPowerOn) return;

        // Stop current stream immediately
        radioStream.pause();
        radioStream.src = "";

        // Play the "tuning" dial sound
        statusEl.innerText = "Tuning...";
        dialSfx.play().catch(e => console.log("Audio play blocked: ", e));

        // Pick a random station
        const station = radioStations[Math.floor(Math.random() * radioStations.length)];
        
        nameEl.innerText = station.name;
        freqEl.innerText = station.freq + (station.freq.includes('.') ? " MHz" : "");
        
        // Load the new stream
        radioStream.src = station.url;
        radioStream.load();

        // Only stop dial sound when the stream is actually playing
        radioStream.onplaying = () => {
            dialSfx.pause();
            dialSfx.currentTime = 0;
            statusEl.innerText = "Live";
        };

        radioStream.onerror = () => {
            statusEl.innerText = "Stream Error - Try Next";
            dialSfx.pause();
        };
    }

    function togglePower() {
        isPowerOn = !isPowerOn;
        
        if (isPowerOn) {
            pwrBtn.classList.add('on');
            pwrBtn.innerText = "OFF";
            playRandomStation();
        } else {
            pwrBtn.classList.remove('on');
            pwrBtn.innerText = "Power";
            radioStream.pause();
            dialSfx.pause();
            nameEl.innerText = "RADIO OFF";
            freqEl.innerText = "--.- MHz";
            statusEl.innerText = "Ready to Play";
        }
    }

    function nextStation() {
        if (isPowerOn) {
            playRandomStation();
        }
    }
